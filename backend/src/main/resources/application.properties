##==============================
# ENVIRONMENT VARIABLES
# ==============================
# Automatically loaded by spring-dotenv library

# ==============================
# DATASOURCE (Supabase)
# ==============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==============================
# JPA
# ==============================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# ==============================
# SCHEDULER
# ==============================
# Local dev default: disabled. Set true in env/profile when needed.
app.scheduler.enabled=false

# ==============================
# LOGGING & TRACING CONFIG
# ==============================
# Actuator endpoints needed for tracing propagation in Spring Boot 3
management.endpoints.web.exposure.include=health,info,prometheus
management.tracing.sampling.probability=1.0

# Logging Level
logging.level.com.walkmate=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG

# Customize Log Pattern to include TraceId and SpanId via MDC explicitly 
# (By default Spring Boot 3 + Brave adds it, but making it explicit helps structure)
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %5p [traceId=%mdc{traceId:-},spanId=%mdc{spanId:-}] [%15.15t] %-40.40logger{39} : %m%n